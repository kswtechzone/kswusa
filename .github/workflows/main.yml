name: Deploy to cPanel via FTP

on:
  push:
    branches: [Prod, main]  # or your deployment branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # or your preferred version

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 65.109.25.210
          username: kswusa
          password: Pinky_12##
          server-dir: /home3/kswtechzone/kswtechnology.com.np/  # Adjust to your cPanel target folder
          local-dir: dist/
